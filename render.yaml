services:
  - type: web
    name: jarvis
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: python run.py
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PROXY_SECRET
        value: jarvis-proxy-sec-9f8d7c6b5a4
      - key: AGENTROUTER_BASE_URL
        value: https://agentrouter.org/v1
      - key: GOOGLE_TOKEN_B64
        value: 
    healthCheckPath: /health

